# ============================================================
# coxswain manifest: example vessel: single-ESC-plus-rudder skiff
# The first-water hull shape: one ESC, one rudder servo, both driven off
# the $CXOUT serial bridge (D-026/D-027), NMEA 0183 GNSS+heading, no
# Cyphal at all.
# ============================================================

[manifest]
schema_version = 7
vessel_id      = "se-rise-rudderboat-01"
name           = "Rudderboat"
revision       = 1
author         = "freol"
date           = "2026-07-12"

[conn_node]
board          = "nucleo-h753zi"
watchdog_ms    = 250

[geometry]
origin  = "midship_waterline"

# ------------------------------------------------------------
# Buses
# ------------------------------------------------------------

[[bus]]
id       = "actuator_bridge"
kind     = "actuator_uart"
port     = "uart4"
[bus.actuator_uart]
baud     = 115200

[[bus]]
id       = "gnss_serial"
kind     = "nmea0183_uart"
port     = "uart7"
[bus.nmea0183_uart]
baud     = 4800
checksum = "required"

[[bus]]
id       = "rc_link"
kind     = "crsf_uart"
port     = "uart5"
# baud omitted: defaults to 420000, CRSF's real link rate (termios2/BOTHER
# territory, not a POSIX Bxxxx rate)

# ------------------------------------------------------------
# Sensors
# ------------------------------------------------------------

[[sensor]]
id      = "gnss_main"
role    = "gnss"
driver  = "nmea0183"
bus     = "gnss_serial"
license = "inner_loop"
[sensor.nmea0183]
talkers   = ["GP", "GN"]
sentences = ["GGA", "RMC", "VTG"]

[[sensor]]
id      = "heading_main"
role    = "heading"
driver  = "nmea0183"
bus     = "gnss_serial"
license = "inner_loop"
[sensor.nmea0183]
talkers   = ["GP", "GN"]
sentences = ["HDT"]

# ------------------------------------------------------------
# Effectors (D-026/D-027): one ESC astern of the origin, one rudder
# further astern. Both terminate on the actuator_uart bridge; calibration
# is manifest data so the bridge firmware stays a dumb PWM copier.
# ------------------------------------------------------------

[[effector]]
id      = "esc_main"
kind    = "fixed_thruster"
bus     = "actuator_bridge"
[effector.fixed_thruster]
pos               = [-1.20, 0.00]    # x fwd, y stbd
azimuth_rad       = 0.0
max_thrust_fwd_n  = 300.0
max_thrust_rev_n  = 180.0
[effector.output]
channel = 0
[effector.output.pwm]
us_min    = 1100
us_center = 1500
us_max    = 1900

[[effector]]
id      = "rudder_main"
kind    = "rudder"
bus     = "actuator_bridge"
[effector.rudder]
pos                        = [-1.80]  # longitudinal lever only
side_force_n_per_rad_mps2  = 400.0
max_angle_rad              = 0.6
min_effective_speed_mps    = 0.5
[effector.output]
channel = 1
[effector.output.pwm]
us_min    = 1100
us_center = 1500
us_max    = 1900

# ------------------------------------------------------------
# RC hand controller (D-025): the first-water hull's manual claimant.
# Channel mapping and shaping match coxswain-drivers::rc::Config field for
# field; claimant is authored directly, same out-of-band-agreement
# convention as [[claimant]].id below.
# ------------------------------------------------------------

[rc]
bus                = "rc_link"
claimant           = 1
kill_channel       = 4
takeover_channel   = 5
surge_channel      = 2
yaw_channel        = 3
switch_low_us      = 1300
switch_high_us     = 1700
stick_deadband_us  = 12
max_surge_n        = 150.0
max_yaw_nm         = 60.0

# ------------------------------------------------------------
# Claimants
# ------------------------------------------------------------

[[claimant]]
name     = "autonomy"
id       = 0
priority = 0

[[claimant]]
name     = "rc"
id       = 1
priority = 100        # the hand controller outranks autonomy on request

# ------------------------------------------------------------
# Estimator
# ------------------------------------------------------------

[estimator]
model   = "fossen_3dof"
gnss    = ["gnss_main"]
heading = ["heading_main"]

[estimator.params]
mass_kg   = 180.0
izz_kg_m2 = 70.0
x_udot    = -15.0
y_vdot    = -110.0
n_rdot    = -60.0
x_u       = -28.0
y_v       = -180.0
n_r       = -90.0

# ------------------------------------------------------------
# Supervisor
# ------------------------------------------------------------

[supervisor]
claimant_heartbeat_ms      = 1000
conn_grant_default         = "none"
position_degraded_after_ms = 3000
low_voltage_v               = 12.0
critical_voltage_v          = 11.4
power_stale_after_ms        = 4000

[supervisor.geofence]
enabled = true
action  = "hold"
polygon = [
  [11.9000, 57.6900],
  [11.9100, 57.6900],
  [11.9100, 57.6850],
  [11.9000, 57.6850],
  [11.9000, 57.6900],
]
