name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same image as the devcontainer: CI and dev cannot drift apart.
      # First run builds the image; cacheFrom keeps subsequent runs fast.
      # Set up a GHCR push (imageName + push: always) once the repo is public
      # so the cache is shared across runners.
      #
      # The no_std crate list is inlined, not passed as a workflow `env:`.
      # runCmd executes inside the container via `devcontainer exec`, which does
      # not inherit the runner's environment: an env var referenced here would
      # expand to empty and silently turn the gate into a whole-workspace
      # cross-build. Extend the list as the workspace grows; adapter crates
      # (keelson, hosted binaries) deliberately stay off it.
      #
      # Every crate on the list is no_std with default features. coxswain-manifest
      # carries the TOML parser and host tool behind an additive `std` feature,
      # off by default, so the gate needs no per-crate flags here.
      - name: lint, test (host), cross-build gate (thumbv7em)
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
          push: never
          runCmd: |
            set -e
            cargo fmt --all --check
            cargo clippy --workspace --all-targets -- -D warnings
            cargo test --workspace
            cargo build --release --target thumbv7em-none-eabihf \
              -p coxswain-contract \
              -p coxswain-estimator \
              -p coxswain-guidance \
              -p coxswain-supervisor \
              -p coxswain-manifest
