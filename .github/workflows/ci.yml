name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml declares the toolchain, components, and the
      # thumbv7em target; rustup show triggers the install up front so
      # rust-cache keys on the pinned rustc, not the runner default.
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # crates/coxswain-xprofile-target (the thumbv7em QEMU harness binary)
      # is deliberately excluded from the root workspace (see its Cargo.toml
      # comment), so the two checks above never touch it; check it here.
      # RUSTFLAGS="" overrides the root .cargo/config.toml's staged
      # `linker = "flip-link"` (unavailable here; the crate's build.rs
      # supplies the one link arg it needs directly).
      - run: cargo fmt --check
        working-directory: crates/coxswain-xprofile-target
      - run: RUSTFLAGS="" cargo clippy --target thumbv7em-none-eabihf --bins -- -D warnings
        working-directory: crates/coxswain-xprofile-target
      # Installs the pinned zenohd the integration tests spawn, and (new)
      # qemu-system-arm, which lets coxswain-xprofile-check's tests/
      # xprofile.rs actually execute CLAUDE.md invariant 5 under `cargo test
      # --workspace` below instead of skipping (idempotent; runners have
      # passwordless sudo). Same provisioning as the devcontainer.
      - run: bash .devcontainer/postCreate.sh
      # Best-effort: enables coxswain-hosted/tests/can_rig.rs's vcan
      # end-to-end path. This runner has /lib/modules, unlike the
      # devcontainer's WSL2 kernel, so this should succeed; `|| true`
      # guards it anyway so a runner without vcan support still passes,
      # via that test's own runtime skip (can_rig.rs's module doc comment).
      - run: sudo modprobe vcan || true
      - run: cargo test --workspace
      - run: >
          cargo build --target thumbv7em-none-eabihf
          -p coxswain-contract
          -p coxswain-model
          -p coxswain-estimator
          -p coxswain-guidance
          -p coxswain-allocation
          -p coxswain-supervisor
          -p coxswain-manifest
          -p coxswain-nmea0183
          -p coxswain-crsf
          -p coxswain-n2k
          -p coxswain-drivers
          --features coxswain-contract/serde
